<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>市民革命 演習所 | 世界史 確認テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Old+Mincho:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Courier+Prime&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="board">

  <header class="letterhead">
    <div class="letterhead__eyebrow">WORLD HISTORY ARCHIVE — 議事録 第2号</div>
    <h1 class="letterhead__title">市民革命　演習所</h1>
    <div class="letterhead__sub">フランス革命 ・ アメリカ独立革命 ・ 南北戦争</div>
  </header>

  <main class="chamber" id="chamber">

    <!-- 採決タリー（賛成=正解 / 反対=不正解） -->
    <div class="tally" id="tally" aria-live="polite">
      <div class="tally__group">
        <span class="tally__label">正解</span>
        <span class="tally__marks" id="tally-correct"></span>
      </div>
      <div class="tally__group">
        <span class="tally__label">不正解</span>
        <span class="tally__marks" id="tally-wrong"></span>
      </div>
      <div class="tally__count" id="tally-progress">第 1 条 / 全 20 条</div>
    </div>

    <!-- 出題カード -->
    <section class="docket" id="docket">
      <div class="docket__number" id="article-number">第１条</div>
      <p class="docket__question" id="question-text">問題文がここに表示されます</p>

      <form class="docket__form" id="answer-form" autocomplete="off">
        <input
          type="text"
          id="answer-input"
          class="docket__input"
          placeholder="解答を記入……"
          aria-label="解答入力欄"
        >
        <button type="submit" class="btn btn--primary" id="submit-btn">回答する</button>
      </form>

      <div class="verdict" id="verdict" aria-live="assertive">
        <div class="stamp" id="stamp"></div>
        <p class="verdict__correct-answer" id="correct-answer-text"></p>
        <button class="btn btn--ghost" id="next-btn">次の条文へ →</button>
      </div>
    </section>

  </main>

  <!-- 結果画面 -->
  <section class="results" id="results" hidden>
    <h2 class="results__title">決議結果</h2>
    <p class="results__score" id="results-score"></p>

    <div class="results__list" id="results-list"></div>

    <div class="results__actions">
      <button class="btn btn--primary" id="retry-all-btn">もう一度（全問）</button>
      <button class="btn btn--ghost" id="retry-wrong-btn">不正解のみ再挑戦</button>
    </div>
  </section>

  <footer class="seal-footer">
    <span>個別指導　学習用演習サイト</span>
  </footer>

</div>

<script src="js/questions.js"></script>
<script src="js/app.js"></script>
</body>
</html>

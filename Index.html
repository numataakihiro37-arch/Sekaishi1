<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>明治政変史 確認テスト</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
<style>
:root {
  --paper: #efe7d3;
  --sumi: #211d18;
  --sumi-soft: #4a443b;
  --ai: #1f3a5c;
  --ai-light: #345680;
  --shu: #ab3b26;
  --gold: #9c7a3c;
  --line: rgba(31, 58, 92, 0.16);
  --ok: #2f5d3a;
  --font-display: "Shippori Mincho", serif;
  --font-body: "Zen Kaku Gothic New", sans-serif;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: var(--font-body);
  color: var(--sumi);
  background-color: var(--paper);
  background-image: repeating-linear-gradient(var(--paper) 0px, var(--paper) 27px, var(--line) 27px, var(--line) 28px);
  -webkit-font-smoothing: antialiased;
}
.page { min-height: 100%; display: flex; flex-direction: column; align-items: center; padding: 40px 18px 72px; }
.doc-header { width: 100%; max-width: 720px; display: flex; justify-content: space-between; align-items: flex-end; padding: 0 4px 10px; border-bottom: 2px solid var(--sumi); margin-bottom: 30px; }
.doc-header .no { font-size: 12px; letter-spacing: 0.08em; color: var(--sumi-soft); }
.doc-header .brand { font-family: var(--font-display); font-weight: 800; font-size: 15px; letter-spacing: 0.14em; color: var(--ai); }
.shell { width: 100%; max-width: 720px; }
.cover { background: rgba(255,253,246,0.55); border: 1px solid var(--sumi); box-shadow: 6px 6px 0 rgba(31,58,92,0.08); padding: 46px 34px 38px; position: relative; overflow: hidden; }
.cover::before { content: ""; position: absolute; inset: 8px; border: 1px solid var(--gold); opacity: 0.5; pointer-events: none; }
.cover-eyebrow { font-size: 12px; letter-spacing: 0.35em; color: var(--shu); font-weight: 700; margin: 0 0 14px; }
.cover h1 { font-family: var(--font-display); font-weight: 800; font-size: clamp(30px, 6vw, 44px); line-height: 1.35; margin: 0 0 8px; color: var(--sumi); }
.cover .sub { font-family: var(--font-display); color: var(--ai); font-size: 15px; margin: 0 0 28px; letter-spacing: 0.04em; }
.toc { border-top: 1px solid var(--sumi); border-bottom: 1px solid var(--sumi); padding: 14px 0; margin-bottom: 30px; }
.toc-row { display: flex; align-items: baseline; gap: 14px; padding: 9px 2px; font-size: 14.5px; }
.toc-row + .toc-row { border-top: 1px dashed rgba(31,58,92,0.25); }
.toc-row .label { font-family: var(--font-display); font-weight: 700; color: var(--shu); min-width: 52px; }
.toc-row .title { font-weight: 700; color: var(--sumi); }
.toc-row .range { margin-left: auto; color: var(--sumi-soft); font-size: 12.5px; }
.start-btn { display: inline-flex; align-items: center; gap: 10px; background: var(--ai); color: #fbf6e9; border: none; font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: 0.08em; padding: 15px 30px; cursor: pointer; }
.start-btn:hover { background: var(--ai-light); }
.meta-line { margin-top: 14px; font-size: 12.5px; color: var(--sumi-soft); }
.progress-rail { display: flex; gap: 6px; margin-bottom: 18px; }
.progress-seg { flex: 1; height: 6px; background: rgba(31,58,92,0.14); position: relative; overflow: hidden; }
.progress-seg > span { position: absolute; inset: 0; background: var(--ai); transform-origin: left; transition: transform 0.35s ease; }
.section-tag { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); color: var(--shu); font-weight: 700; font-size: 13px; letter-spacing: 0.12em; margin-bottom: 6px; }
.section-tag .count { margin-left: auto; font-family: var(--font-body); color: var(--sumi-soft); font-weight: 500; letter-spacing: 0; }
.q-card { background: rgba(255,253,246,0.6); border: 1px solid var(--sumi); padding: 26px 24px 24px; position: relative; }
.q-card::before { content: ""; position: absolute; inset: 6px; border: 1px solid var(--gold); opacity: 0.4; pointer-events: none; }
.q-text { font-size: 17px; line-height: 1.75; font-weight: 700; margin: 0 0 20px; color: var(--sumi); }
.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
.opt-btn { text-align: left; font-family: var(--font-body); font-size: 15px; background: transparent; border: 1.5px solid rgba(31,58,92,0.35); padding: 13px 16px; cursor: pointer; display: flex; gap: 12px; align-items: center; width: 100%; }
.opt-btn .tag { font-family: var(--font-display); font-weight: 700; color: var(--ai); min-width: 18px; }
.opt-btn:hover:not(:disabled) { border-color: var(--ai); background: rgba(31,58,92,0.05); }
.opt-btn.correct { border-color: var(--ok); background: rgba(47,93,58,0.1); }
.opt-btn.wrong { border-color: var(--shu); background: rgba(171,59,38,0.08); }
.opt-btn:disabled { cursor: default; opacity: 0.75; }
.text-input-row { display: flex; gap: 10px; margin-bottom: 4px; }
.text-input-row input { flex: 1; font-family: var(--font-body); font-size: 15px; padding: 13px 14px; border: 1.5px solid rgba(31,58,92,0.35); background: #fffdf6; }
.submit-btn { font-family: var(--font-display); font-weight: 700; background: var(--sumi); color: var(--paper); border: none; padding: 0 22px; cursor: pointer; }
.submit-btn:disabled { opacity: 0.4; cursor: default; }
.feedback { margin-top: 18px; display: flex; gap: 16px; align-items: flex-start; }
.stamp { flex-shrink: 0; width: 58px; height: 58px; border-radius: 50%; border: 3px solid var(--shu); color: var(--shu); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; font-size: 15px; letter-spacing: 0.05em; transform: rotate(-14deg) scale(0); animation: stamp-in 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.stamp.miss { border-color: var(--sumi); color: var(--sumi); border-style: double; }
@keyframes stamp-in { to { transform: rotate(-14deg) scale(1); } }
.explain { flex: 1; font-size: 14px; line-height: 1.75; color: var(--sumi-soft); padding-top: 4px; }
.explain strong { color: var(--sumi); }
.next-row { margin-top: 22px; display: flex; justify-content: flex-end; }
.next-btn { font-family: var(--font-display); font-weight: 700; background: var(--ai); color: #fbf6e9; border: none; padding: 12px 24px; cursor: pointer; letter-spacing: 0.06em; }
.next-btn:hover { background: var(--ai-light); }
.result-card { background: rgba(255,253,246,0.6); border: 1px solid var(--sumi); padding: 40px 30px 30px; text-align: center; position: relative; }
.result-card::before { content: ""; position: absolute; inset: 7px; border: 1px solid var(--gold); opacity: 0.45; pointer-events: none; }
.big-stamp { width: 118px; height: 118px; margin: 0 auto 18px; border-radius: 50%; border: 5px solid var(--shu); color: var(--shu); display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: var(--font-display); transform: rotate(-10deg) scale(0); animation: stamp-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
.big-stamp .score { font-size: 30px; font-weight: 800; line-height: 1; }
.big-stamp .of { font-size: 12px; margin-top: 2px; }
.result-msg { font-family: var(--font-display); font-size: 20px; font-weight: 700; margin: 0 0 6px; }
.result-sub { font-size: 13.5px; color: var(--sumi-soft); margin: 0 0 28px; }
.section-scores { text-align: left; border-top: 1px solid var(--sumi); padding-top: 20px; margin-bottom: 26px; }
.sec-score-row { display: flex; align-items: center; gap: 12px; font-size: 13.5px; padding: 8px 0; }
.sec-score-row .name { font-family: var(--font-display); font-weight: 700; min-width: 170px; }
.sec-score-row .bar { flex: 1; height: 8px; background: rgba(31,58,92,0.12); position: relative; }
.sec-score-row .bar > span { position: absolute; inset: 0; background: var(--ai); }
.sec-score-row .val { min-width: 40px; text-align: right; color: var(--sumi-soft); }
.review-list { text-align: left; border-top: 1px solid var(--sumi); padding-top: 20px; }
.review-item { padding: 14px 0; border-bottom: 1px dashed rgba(31,58,92,0.25); font-size: 13.5px; line-height: 1.7; }
.review-item .q { font-weight: 700; margin-bottom: 4px; }
.review-item .your { color: var(--shu); }
.review-item .right { color: var(--ok); }
.retry-btn { margin-top: 26px; font-family: var(--font-display); font-weight: 700; background: var(--sumi); color: var(--paper); border: none; padding: 13px 26px; cursor: pointer; }
.retry-btn:hover { background: #35302a; }
.foot-note { text-align: center; font-size: 11.5px; color: var(--sumi-soft); margin-top: 26px; letter-spacing: 0.04em; }
@media (max-width: 480px) {
  .q-card, .cover, .result-card { padding: 24px 16px 20px; }
  .toc-row .range { display: none; }
}
</style>
</head>
<body>
<div class="page">
  <div class="doc-header">
    <span class="no">確認テスト・No. 05</span>
    <span class="brand">日本史 近代史ノート</span>
  </div>
  <div class="shell" id="app"></div>
  <p class="foot-note" id="footNote"></p>
</div>

<script>
// ---------- 問題データ ----------
const sections = [
  { id: "bakumatsu", label: "第一章", title: "幕末の動乱", range: "ペリー来航 〜 王政復古の大号令" },
  { id: "seifu", label: "第二章", title: "明治政府の発足", range: "戊辰戦争 〜 地租改正" },
  { id: "seihen", label: "第三章", title: "明治六年の政変と士族反乱", range: "征韓論 〜 西南戦争" },
  { id: "kenpou", label: "第四章", title: "自由民権運動と憲法発布", range: "明治十四年の政変 〜 大日本帝国憲法" },
];

const questions = [
  { section: "bakumatsu", type: "mc", q: "1854年に結ばれ、日本を開国させたが貿易は認めなかった条約は?", options: ["日米修好通商条約", "日米和親条約", "日米通商航海条約", "下関条約"], answer: 1, explain: "日米和親条約(1854年)は開国のみで貿易は認めなかった。貿易まで認めたのは1858年の日米修好通商条約。" },
  { section: "bakumatsu", type: "text", q: "日米修好通商条約を大老として無勅許で調印し、桜田門外の変で暗殺された人物は誰?", answer: ["井伊直弼", "いいなおすけ"], explain: "井伊直弼は無勅許調印への反対派(尊王攘夷派)を弾圧(安政の大獄)したが、桜田門外の変で暗殺された。" },
  { section: "bakumatsu", type: "mc", q: "朝廷と幕府が協力する体制を何と呼ぶか?(薩摩・会津が中心)", options: ["尊王攘夷", "公武合体", "大政奉還", "王政復古"], answer: 1, explain: "公武合体は朝廷(公)と幕府(武)が協力する体制。天皇中心で外国を追い払おうとする長州中心の考えは尊王攘夷。" },
  { section: "bakumatsu", type: "mc", q: "薩長同盟が結ばれるきっかけとなった出来事は?", options: ["薩長芸が外国と戦い攘夷をあきらめた", "桜田門外の変", "五稜郭の戦い", "地租改正反対一揆"], answer: 0, explain: "薩長(芸)は実際に外国と戦って攘夷の困難さを痛感し、討幕へ方針転換して薩長同盟を結んだ。" },
  { section: "bakumatsu", type: "text", q: "1867年10月14日、徳川慶喜が政権を朝廷に返上したことを何というか?", answer: ["大政奉還"], explain: "同日、討幕派(薩長・岩倉)は討幕の密勅を得ていた。大政奉還のあと王政復古の大号令が出される。" },
  { section: "bakumatsu", type: "mc", q: "王政復古の大号令の後、旧幕府派が新政府に対して起こした一連の戦いは?", options: ["西南戦争", "戊辰戦争", "秩父事件", "萩の乱"], answer: 1, explain: "徳川慶喜への辞官納地に旧幕府派が反発し、戊辰戦争(鳥羽・伏見の戦い〜五稜郭の戦い)に発展した。" },

  { section: "seifu", type: "mc", q: "戊辰戦争で、勝海舟と西郷隆盛の交渉により実現したことは?", options: ["会津若松の落城", "江戸城無血開城", "五稜郭の戦い", "奥羽越列藩同盟結成"], answer: 1, explain: "勝海舟と西郷隆盛の会談により江戸城は無血開城され、江戸での戦闘は回避された。" },
  { section: "seifu", type: "text", q: "戊辰戦争の最後の戦い(函館)で榎本武揚が降伏した戦いは何の戦い?", answer: ["五稜郭の戦い", "五稜郭"], explain: "五稜郭の戦いをもって戊辰戦争は終結した。" },
  { section: "seifu", type: "mc", q: "新政府の基本方針として、公議世論の尊重・開国和親などを示したものは?", options: ["五榜の掲示", "五箇条の誓文", "政体書", "教育勅語"], answer: 1, explain: "五箇条の誓文は新政府の基本方針。一方、五榜の掲示は徒党・強訴やキリスト教の禁止など国民統制の方針。" },
  { section: "seifu", type: "mc", q: "版籍奉還で「版」「籍」が指すものの組み合わせとして正しいのは?", options: ["版=領民、籍=領地", "版=領地、籍=領民", "版=軍隊、籍=財政", "版=戸籍、籍=土地台帳"], answer: 1, explain: "版籍奉還は「版(領地)」と「籍(領民)」を藩主が天皇に返還したもの。旧藩主は知藩事に任命され家禄を支給された。" },
  { section: "seifu", type: "text", q: "版籍奉還の後、藩を廃止して県を置き中央集権体制を確立した政策は?", answer: ["廃藩置県"], explain: "廃藩置県により知藩事は罷免され、中央から府知事・県令が任命されるようになった(薩長土の御親兵が背景)。" },
  { section: "seifu", type: "mc", q: "「四民平等」の内容として正しいものは?", options: ["士農工商を廃止し、華族・士族・平民とした", "参政権をすべての成人男女に与えた", "地租を全国一律3%とした", "徴兵告諭により兵役を免除した"], answer: 0, explain: "四民平等では士農工商を廃止して華族・士族・平民に再編し、えた・非人も(実際には「新平民」として)廃止、苗字も許可された。" },
  { section: "seifu", type: "mc", q: "徴兵令(フランス式)の国民皆兵原則の内容は?", options: ["満18歳の男子に2年間の兵役", "満20歳の男子に3年間の兵役", "満25歳以上の戸主のみに兵役", "士族のみを対象とした兵役"], answer: 1, explain: "満20歳の男子に3年間の兵役を課す国民皆兵原則。ただし戸主・長男・官吏・学生・代人料270円の納入者などは免役規定があった。" },
  { section: "seifu", type: "text", q: "1873年、課税基準を収穫高から地価に変更し、金納とした改革は?", answer: ["地租改正"], explain: "地租改正条例(1873)により、税率は地価の3%、地券所有者が納税者とされた。" },

  { section: "seihen", type: "mc", q: "明治六年の政変(1873)で対立した2派の組み合わせとして正しいのは?", options: ["征韓派(西郷)vs 内治派(大久保)", "尊王派(西郷)vs 佐幕派(大久保)", "討幕派(西郷)vs 公武合体派(大久保)", "開国派(西郷)vs 攘夷派(大久保)"], answer: 0, explain: "武力で朝鮮を開国させようとする征韓派(西郷隆盛ら)と、国内優先の内治派(大久保利通)が対立し、内治派が主導権を握った。" },
  { section: "seihen", type: "text", q: "明治六年の政変で下野した後、板垣退助・後藤象二郎・江藤新平・副島種臣が提出し、国会開設を求めたものは?", answer: ["民撰議院設立の建白書", "民撰議院設立建白書"], explain: "大久保中心の専制政治を非難し、国会開設を要求。これが自由民権運動へとつながっていく。" },
  { section: "seihen", type: "mc", q: "大久保利通・板垣退助・木戸孝允が会談し、立憲制への漸進方針を確認した会議は?", options: ["大阪会議", "御前会議", "岩倉使節団会議", "五箇条会議"], answer: 0, explain: "大阪会議で漸次立憲政体樹立の詔が出される一方、讒謗律・新聞紙条例という言論弾圧策も同時に取られた。" },
  { section: "seihen", type: "mc", q: "秩禄処分の内容として正しいものは?", options: ["秩禄を廃止し、金禄公債証書による一時金を支給した", "秩禄を倍増し、士族の生活を保障した", "秩禄を地租に置き換えて毎年支給し続けた", "秩禄処分は行われず、廃刀令のみが実施された"], answer: 0, explain: "秩禄(国家予算の3〜4割を占めた)を廃止し金禄公債証書で一時金を支給。廃刀令も重なり士族の反乱を招いた。" },
  { section: "seihen", type: "mc", q: "秩禄処分・廃刀令に反発した不平士族の反乱に該当しないものは?", options: ["敬神党の乱(熊本)", "秋月の乱(福岡県)", "萩の乱(山口)", "生野の変"], answer: 3, explain: "敬神党の乱・秋月の乱・萩の乱、そして最大規模の西南戦争(鹿児島)が不平士族の反乱にあたる。生野の変は幕末の事件。" },
  { section: "seihen", type: "text", q: "士族最大の反乱で、敗れた西郷隆盛が自刃した戦いは?", answer: ["西南戦争"], explain: "西南戦争(鹿児島)の敗北により士族の武力反抗は終結し、以後の反政府運動は自由民権運動という言論の形をとるようになった。" },

  { section: "kenpou", type: "mc", q: "1881年の「明治十四年の政変」で起きたことは?", options: ["伊藤博文が大隈重信を追放し、十年後の国会開設を公約した", "大隈重信が伊藤博文を追放し、憲法制定を撤回した", "西郷隆盛が政界に復帰した", "廃藩置県が撤回された"], answer: 0, explain: "伊藤博文が大隈重信を政府から追放し、十年後(1890年)の国会開設を公約した政変。" },
  { section: "kenpou", type: "text", q: "大日本帝国憲法が発布されたのは西暦何年何月何日?(年月日で)", answer: ["1889年2月11日", "1889/2/11", "2月11日"], explain: "1889年2月11日(紀元節)に発布された。起草の中心は伊藤博文ら。" },
  { section: "kenpou", type: "text", q: "大日本帝国憲法起草の中心人物で、初代内閣総理大臣も務めた人物は?", answer: ["伊藤博文", "いとうひろぶみ"], explain: "伊藤博文は憲法起草の中心人物であり、初代内閣総理大臣でもある。" },
  { section: "kenpou", type: "mc", q: "伊藤博文が大日本帝国憲法第四条を重要視した理由として適切なのは?", options: ["天皇の権力を無制限にするため", "天皇は憲法に定められていないことは実行できないとし、国家権力を制限して立憲君主制の根本を定めるため", "国会の権限を天皇より優先させるため", "外国との条約締結権を天皇から奪うため"], answer: 1, explain: "天皇の統治権も憲法の枠内に置くという国家権力の制限=立憲君主制の根本を明確にする条文だったため重要視された。" },
];

const KANA = ["A", "B", "C", "D"];
document.getElementById("footNote").textContent = "明治維新〜大日本帝国憲法発布 / 全" + questions.length + "問";

// ---------- 状態 ----------
let qIndex = 0;
let answers = [];
let revealed = false;
let selectedIdx = null;

function normalize(str) {
  return str.trim().replace(/\s+/g, "")
    .replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xfee0))
    .toLowerCase();
}
function sectionMeta(id) { return sections.find(s => s.id === id); }
function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

const app = document.getElementById("app");

function renderCover() {
  let toc = sections.map(s =>
    `<div class="toc-row"><span class="label">${s.label}</span><span class="title">${s.title}</span><span class="range">${s.range}</span></div>`
  ).join("");
  app.innerHTML = `
    <div class="cover">
      <p class="cover-eyebrow">教科書 P48〜53 準拠</p>
      <h1>明治政変史<br>確認テスト</h1>
      <p class="sub">幕末の動乱から大日本帝国憲法発布まで、全${questions.length}問</p>
      <div class="toc">${toc}</div>
      <button class="start-btn" id="startBtn">テストを始める →</button>
      <p class="meta-line">一問ずつ回答し、その場で正誤と解説が表示されます。</p>
    </div>`;
  document.getElementById("startBtn").onclick = startQuiz;
}

function startQuiz() {
  qIndex = 0; answers = []; revealed = false; selectedIdx = null;
  renderQuiz();
}

function renderQuiz() {
  const q = questions[qIndex];
  const meta = sectionMeta(q.section);
  const total = questions.length;

  let rail = "";
  for (let i = 0; i < total; i++) {
    rail += `<div class="progress-seg"><span style="transform:${i <= qIndex ? "scaleX(1)" : "scaleX(0)"}"></span></div>`;
  }

  let body = "";
  if (q.type === "mc") {
    let opts = q.options.map((opt, i) => {
      let cls = "opt-btn";
      if (revealed && i === q.answer) cls += " correct";
      else if (revealed && i === selectedIdx && i !== q.answer) cls += " wrong";
      return `<button class="${cls}" ${revealed ? "disabled" : ""} data-idx="${i}"><span class="tag">${KANA[i]}</span><span>${esc(opt)}</span></button>`;
    }).join("");
    body = `<div class="options">${opts}</div>`;
  } else {
    body = `<div class="text-input-row">
      <input type="text" id="textAns" placeholder="答えを入力" ${revealed ? "disabled" : ""} />
      <button class="submit-btn" id="submitBtn" ${revealed ? "disabled" : ""}>回答する</button>
    </div>`;
  }

  let feedback = "";
  if (revealed) {
    const last = answers[answers.length - 1];
    feedback = `
      <div class="feedback">
        <div class="stamp${last.correct ? "" : " miss"}">${last.correct ? "正解" : "不正解"}</div>
        <p class="explain">${!last.correct ? `正解: <strong>${esc(last.right)}</strong><br>` : ""}${esc(q.explain)}</p>
      </div>
      <div class="next-row"><button class="next-btn" id="nextBtn">${qIndex + 1 >= total ? "結果を見る →" : "次の問題 →"}</button></div>`;
  }

  app.innerHTML = `
    <div class="progress-rail">${rail}</div>
    <div class="section-tag"><span>${meta.label}・${meta.title}</span><span class="count">問 ${qIndex + 1} / ${total}</span></div>
    <div class="q-card">
      <p class="q-text">${esc(q.q)}</p>
      ${body}
      ${feedback}
    </div>`;

  if (q.type === "mc") {
    app.querySelectorAll(".opt-btn").forEach(btn => {
      btn.onclick = () => chooseOption(parseInt(btn.dataset.idx, 10));
    });
  } else {
    const input = document.getElementById("textAns");
    const submitBtn = document.getElementById("submitBtn");
    submitBtn.onclick = () => submitText(input.value);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") submitText(input.value);
    });
    input.addEventListener("input", () => {
      submitBtn.disabled = input.value.trim() === "";
    });
  }
  if (revealed) {
    document.getElementById("nextBtn").onclick = next;
  }
}

function chooseOption(idx) {
  if (revealed) return;
  selectedIdx = idx;
  const q = questions[qIndex];
  const correct = idx === q.answer;
  answers.push({ correct, given: q.options[idx], right: q.options[q.answer] });
  revealed = true;
  renderQuiz();
}

function submitText(value) {
  if (revealed || value.trim() === "") return;
  const q = questions[qIndex];
  const given = normalize(value);
  const correct = q.answer.some(a => normalize(a) === given);
  answers.push({ correct, given: value.trim(), right: q.answer[0] });
  revealed = true;
  renderQuiz();
}

function next() {
  if (qIndex + 1 >= questions.length) {
    renderResult();
    return;
  }
  qIndex++; revealed = false; selectedIdx = null;
  renderQuiz();
}

function renderResult() {
  const total = questions.length;
  const score = answers.filter(a => a.correct).length;
  const pct = Math.round((score / total) * 100);
  const msg = pct >= 90 ? "見事、免許皆伝。" : pct >= 70 ? "よく身についています。" : pct >= 50 ? "もう一息、復習を。" : "基本から見直しましょう。";

  const sectionScores = sections.map(s => {
    const idxs = questions.map((q, i) => q.section === s.id ? i : -1).filter(i => i >= 0);
    const got = idxs.filter(i => answers[i] && answers[i].correct).length;
    return { ...s, got, of: idxs.length };
  });

  let scoreRows = sectionScores.map(s => `
    <div class="sec-score-row">
      <span class="name">${s.label}・${s.title}</span>
      <span class="bar"><span style="width:${(s.got / s.of) * 100}%"></span></span>
      <span class="val">${s.got}/${s.of}</span>
    </div>`).join("");

  const wrong = questions.map((q, i) => ({ q, a: answers[i], i })).filter(x => x.a && !x.a.correct);
  let reviewHtml = "";
  if (wrong.length > 0) {
    reviewHtml = `<div class="review-list">${wrong.map(({ q, a, i }) => `
      <div class="review-item">
        <div class="q">${i + 1}. ${esc(q.q)}</div>
        <div class="your">あなたの回答: ${esc(a.given)}</div>
        <div class="right">正解: ${esc(a.right)}</div>
      </div>`).join("")}</div>`;
  }

  app.innerHTML = `
    <div class="result-card">
      <div class="big-stamp"><span class="score">${score}</span><span class="of">／ ${total}問</span></div>
      <p class="result-msg">${msg}</p>
      <p class="result-sub">正答率 ${pct}%</p>
      <div class="section-scores">${scoreRows}</div>
      ${reviewHtml}
      <button class="retry-btn" id="retryBtn">もう一度挑戦する</button>
    </div>`;
  document.getElementById("retryBtn").onclick = startQuiz;
}

renderCover();
</script>
</body>
</html>
